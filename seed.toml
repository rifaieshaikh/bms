# Demo / vertical seeding (copy to seed.toml and edit).
# Precedence for each SEED_* key: Streamlit secrets → env → this file → default.
# Mongo URI stays in .streamlit/secrets.toml.

SEED_CONFIG = true
SEED_QA_FIXTURES = false
PURGE_BUSINESS_DATA = false

# Single control for profile demo seeding:
#   "none" (or empty)  → disabled
#   "boutique"         → one vertical (business + catalog + parties)
#   "pharma,hardware"  → those verticals; uses [business.multi]
#   "all"              → every vertical; uses [business.multi]
# Profiles: boutique, pos, pharma, groceries, footwear, fancy, paint,
#           tiles_granites, hardware, electricals
SEED_PROFILE = "none"

# Counts apply per selected profile (ignored when SEED_PROFILE = none)
SEED_CUSTOMER_COUNT = 100
SEED_VENDOR_COUNT = 100
SEED_CATEGORY_COUNT = 100
SEED_PRODUCT_COUNT = 100

# Optional flat business overrides (applied on top of the chosen [business.*] block)
# SEED_BUSINESS_REGISTRATION = "Registered"
# SEED_BUSINESS_STATE = "32"

# Used when SEED_PROFILE is exactly one profile (e.g. "boutique")
